spring.application.name=order-processing-users

jwt.secret=${JWT_SECRET}
jwt.expiration=${JWT_EXPIRATION}

# disabling; REST services only here
spring.jpa.open-in-view=false

# user props
com.orderprocessing.users.page-size=50
com.orderprocessing.users.max-page-size=50
com.orderprocessing.users.default-sort-attribute=username

logging.level.org.springframework.security.config.annotation.authentication.configuration.InitializeUserDetailsBeanManagerConfigurer=ERROR

