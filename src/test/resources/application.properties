jwt.secret=${JWT_SECRET_TEST}
jwt.expiration=${JWT_EXPIRATION}

# user props
com.orderprocessing.users.page-size=50
com.orderprocessing.users.max-page-size=50
com.orderprocessing.users.default-sort-attribute=username

# Test Logging
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.orm.jdbc.bind=TRACE

logging.level.org.hibernate.stat=DEBUG

# Enable Flyway SQL + info logging
logging.level.org.flywaydb.core=INFO
logging.level.org.flywaydb.core.internal=DEBUG

